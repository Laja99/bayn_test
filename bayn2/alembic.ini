[alembic]
script_location = bayn/core/db

# migration filename: 20260102_1430_a3f9_add_users.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# overridden by env.py which reads DATABASE_URL from settings — this line is a fallback only
sqlalchemy.url = postgresql+asyncpg://%(DB_USER)s:%(DB_PASS)s@%(DB_HOST)s/%(DB_NAME)s

# ─────────────────────────────────────────────
# Common commands (run from project root):
#
#   docker compose exec api alembic revision --autogenerate -m "add table"
#   docker compose exec api alembic upgrade head
#   docker compose exec api alembic downgrade -1
#   docker compose exec api alembic history
#   docker compose exec api alembic current
# ─────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
