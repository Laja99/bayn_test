# ─────────────────────────────────────────────
# docker-compose.yml — بيئة التطوير المحلية
# ─────────────────────────────────────────────
#
# تشغيل:
#   docker compose up -d
#   docker compose up -d --build     # إعادة بناء الصورة
#   docker compose down              # إيقاف
#   docker compose logs -f api       # متابعة الـ logs
#
# ─────────────────────────────────────────────

services:

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: beyn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beyn_db
      POSTGRES_USER: beyn_user
      POSTGRES_PASSWORD: beyn_pass
    ports:
      - "5432:5432"   # نعرض الـ port للاختبار من الجهاز مباشرة
    volumes:
      - postgres_data:/var/lib/postgresql/data   # البيانات تبقى حتى بعد إيقاف الـ container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beyn_user -d beyn_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────────
  api:
    build: .
    container_name: beyn_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env   # نقرأ الـ secrets من .env ولا نكتبها هنا
    environment:
      # نستبدل localhost بـ postgres (اسم الـ service في docker network)
      DATABASE_URL: postgresql+asyncpg://beyn_user:beyn_pass@postgres:5432/beyn_db
    depends_on:
      postgres:
        condition: service_healthy   # ننتظر حتى يصبح postgres جاهزاً
    volumes:
      # في بيئة التطوير: نربط الكود مباشرة عشان نرى التغييرات فوراً
      - ./src:/app/src
    command: >
      uvicorn src.main:app
      --host 0.0.0.0
      --port 8000
      --reload   # auto-reload عند تغيير الكود (للتطوير فقط)

volumes:
  postgres_data:
    name: beyn_postgres_data
